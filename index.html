<script>
const REFERRER = 'frameai-storyboard';
let currentStyle = 'cinematic photorealistic';
let panels = [];

document.querySelectorAll('.sty').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.sty').forEach(x => x.classList.remove('on'));
    c.classList.add('on'); currentStyle = c.dataset.s;
  });
});
document.querySelectorAll('.preset').forEach(p => {
  p.addEventListener('click', () => {
    document.getElementById('conceptInput').value = p.textContent.replace(/^\S+\s/, '').trim();
  });
});
document.getElementById('conceptInput').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
window.addEventListener('load', () => {
  const h = decodeURIComponent(location.hash.slice(1));
  if (h) { document.getElementById('conceptInput').value = h; generate(); }
});

function setStatus(busy, msg, err) {
  const bar = document.getElementById('statusBar');
  bar.innerHTML = `<div class="status-dot ${err?'err':busy?'busy':''}"></div> ${msg}`;
}

async function generate() {
  const concept = document.getElementById('conceptInput').value.trim();
  if (!concept) return;
  document.getElementById('genBtn').disabled = true;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('boardWrap').style.display = 'block';
  setStatus(true, 'Generating scenes…');
  panels = [];
  renderSkeleton();
  try {
    const scenes = await fetchScenes(concept);
    panels = scenes;
    document.getElementById('boardTitle').textContent = concept;
    renderPanels(scenes);
    setStatus(false, `✅ Storyboard ready · ${scenes.length} panels`);
  } catch(e) {
    setStatus(false, '❌ ' + (e.message || 'Error — please retry'), true);
    document.getElementById('boardWrap').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
  }
  document.getElementById('genBtn').disabled = false;
}

async function fetchScenes(concept) {
  const prompt = `You are a storyboard generator API. Return ONLY a valid JSON array of EXACTLY 4 objects. No prose, no markdown, no explanation.
Each object has exactly these keys:
  "title" (string, 4-6 words),
  "imgPrompt" (string, 25-40 words describing the scene visually, style: ${currentStyle}, cinematic, 4k),
  "caption" (string, 20-30 words of narrative prose)
Storyboard concept: "${concept}"`;

  const url = new URL('https://text.pollinations.ai/' + encodeURIComponent(prompt));
  url.searchParams.set('model', 'openai');
  url.searchParams.set('json', 'true');
  url.searchParams.set('seed', String(Math.floor(Math.random() * 99999)));

  const res = await fetch(url.toString());
  if (!res.ok) throw new Error(`API ${res.status}`);

  let data;
  try { data = await res.json(); } catch(e) { throw new Error('Invalid JSON from API'); }

  let arr = Array.isArray(data) ? data : null;
  if (!arr) {
    const key = ['scenes','panels','storyboard','frames','data'].find(k => Array.isArray(data[k]));
    arr = key ? data[key] : Object.values(data).find(v => Array.isArray(v));
  }
  if (!arr || arr.length < 2) throw new Error('Unexpected API response format');

  while (arr.length < 4) {
    const last = arr[arr.length - 1];
    arr.push({ title: `Scene ${arr.length + 1}`, imgPrompt: last.imgPrompt, caption: last.caption });
  }

  return arr.slice(0, 4).map((sc, i) => ({
    storyTitle: concept,
    title:     sc.title      || `Scene ${i + 1}`,
    imgPrompt: (sc.imgPrompt || sc.image_prompt || sc.imagePrompt || sc.prompt || concept) + `, ${currentStyle}, ultra detailed, 4k`,
    caption:   sc.caption    || sc.description  || sc.narrative  || '',
    seed:      Math.floor(Math.random() * 999999)
  }));
}

function renderSkeleton() {
  document.getElementById('boardTitle').textContent = '…';
  document.getElementById('boardGrid').innerHTML = [1,2,3,4].map(i => `
    <div class="panel"><div class="panel-img-wrap">
      <div class="panel-loading"><div class="panel-spinner"></div><div class="panel-load-text">Panel ${i}</div></div>
    </div><div class="panel-body">
      <div style="height:1rem;width:60%;background:var(--border);border-radius:4px;margin-bottom:.6rem"></div>
      <div style="height:.75rem;width:100%;background:var(--border);border-radius:4px;margin-bottom:.35rem"></div>
      <div style="height:.75rem;width:80%;background:var(--border);border-radius:4px"></div>
    </div></div>`).join('');
}

function renderPanels(scenes) {
  document.getElementById('boardGrid').innerHTML = scenes.map((sc, i) => `
    <div class="panel" id="panel-${i}">
      <div class="panel-img-wrap" id="imgwrap-${i}">
        <div class="panel-loading"><div class="panel-spinner"></div><div class="panel-load-text">Flux generating…</div></div>
        <span class="panel-num">0${i+1}</span>
        <button class="panel-regen" id="regen-${i}" onclick="regenPanel(${i})">↻</button>
      </div>
      <div class="panel-body">
        <div class="panel-header-row">
          <div class="panel-title">${sc.title}</div>
          <button class="panel-dl" onclick="dlPanel(${i})">⬇</button>
        </div>
        <div class="panel-caption">${sc.caption}</div>
      </div>
    </div>`).join('');
  scenes.forEach((sc, i) => loadPanelImage(i, sc));
}

function loadPanelImage(idx, sc) {
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(sc.imgPrompt)}?width=896&height=504&model=flux&seed=${sc.seed}&nologo=true&referrer=${REFERRER}`;
  panels[idx].url = url;
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const wrap = document.getElementById('imgwrap-' + idx);
    if (!wrap) return;
    wrap.innerHTML = `<img src="${url}" alt="${panels[idx].title}">
      <span class="panel-num">0${idx+1}</span>
      <button class="panel-regen" id="regen-${idx}" onclick="regenPanel(${idx})">↻</button>`;
    panels[idx].imgEl = wrap.querySelector('img');
  };
  img.onerror = () => {
    const wrap = document.getElementById('imgwrap-' + idx);
    if (wrap) wrap.querySelector('.panel-load-text').textContent = '⚠ Retry';
  };
  img.src = url;
}

function regenPanel(idx) {
  panels[idx].seed = Math.floor(Math.random() * 999999);
  panels[idx].url = null;
  const wrap = document.getElementById('imgwrap-' + idx);
  if (wrap) wrap.innerHTML = `
    <div class="panel-loading"><div class="panel-spinner"></div><div class="panel-load-text">Regenerating…</div></div>
    <span class="panel-num">0${idx+1}</span>
    <button class="panel-regen loading" id="regen-${idx}" onclick="regenPanel(${idx})">⏳</button>`;
  loadPanelImage(idx, panels[idx]);
  setTimeout(() => { const b = document.getElementById('regen-'+idx); if(b){b.classList.remove('loading');b.textContent='↻';} }, 8000);
}

function dlPanel(idx) {
  const url = panels[idx]?.url; if (!url) return;
  const a = document.createElement('a'); a.href = url; a.target = '_blank'; a.download = `frameai-panel-${idx+1}.jpg`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function shareUrl() {
  const concept = document.getElementById('conceptInput').value.trim(); if (!concept) return;
  const url = `${location.origin}${location.pathname}#${encodeURIComponent(concept)}`;
  navigator.clipboard.writeText(url).then(() => setStatus(false, '🔗 URL copied to clipboard'));
}

async function exportPNG() {
  const imgs = panels.map(p => p.imgEl).filter(Boolean);
  if (imgs.length < 2) { setStatus(false, '⚠ Wait for images to load', true); return; }
  setStatus(true, 'Exporting PNG…');
  try {
    const W=896, H=504, GAP=12, PAD=24;
    const canvas = document.getElementById('exportCanvas');
    canvas.width = W*2+GAP+PAD*2; canvas.height = H*2+GAP+PAD*2+60;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle='#0d1117'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#e6edf3'; ctx.font='bold 28px sans-serif'; ctx.textAlign='center';
    ctx.fillText(panels[0]?.storyTitle||'Storyboard', canvas.width/2, PAD+36);
    ctx.fillStyle='#8b949e'; ctx.font='16px sans-serif';
    ctx.fillText('Generated with FrameAI · pollinations.ai', canvas.width/2, PAD+56);
    const pos=[[PAD,PAD+60],[PAD+W+GAP,PAD+60],[PAD,PAD+60+H+GAP],[PAD+W+GAP,PAD+60+H+GAP]];
    for (let i=0; i<Math.min(4,imgs.length); i++) {
      const [x,y]=pos[i];
      try { ctx.drawImage(imgs[i],x,y,W,H); ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(x+8,y+8,32,22);
        ctx.fillStyle='#8b949e'; ctx.font='bold 12px monospace'; ctx.textAlign='left'; ctx.fillText('0'+(i+1),x+14,y+23); } catch(e){}
    }
    canvas.toBlob(blob => {
      const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='frameai-storyboard.png';
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
      setStatus(false,'✅ PNG exported');
    },'image/png');
  } catch(e) { setStatus(false,'⚠ Export failed',true); }
}
</script>
